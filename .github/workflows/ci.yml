name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts - Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint -w contracts
      - run: npm run typecheck -w contracts
      - run: npm run build -w contracts

  functions:
    name: Functions - Lint & Typecheck
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w contracts
      - run: npm run lint -w functions
      - run: npm run typecheck -w functions
      - run: npm run build -w functions

  mobile:
    name: Mobile - Lint & Typecheck
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build -w contracts
      - run: npm run lint -w mobile
      - run: npm run typecheck -w mobile
